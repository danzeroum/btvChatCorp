# BTV Chat Corp — Docker Compose
networks:
  btv-net:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  document_uploads:

services:

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-btv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-btvchat}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [btv-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-btv}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.0
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage
    networks: [btv-net]

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL:     postgresql://${POSTGRES_USER:-btv}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-btvchat}
      OLLAMA_URL: http://172.24.0.1:11434
      OLLAMA_MODEL:     ${OLLAMA_MODEL:-llama3.2:3b}
      EMBEDDING_URL: http://btv_embedding:8001
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      OLLAMA_AUTH_USER: ${OLLAMA_AUTH_USER:?Erro: OLLAMA_AUTH_USER obrigatorio — defina no .env}
      OLLAMA_AUTH_PASS: ${OLLAMA_AUTH_PASS:?Erro: OLLAMA_AUTH_PASS obrigatorio — defina no .env}
      ALLOWED_ORIGINS:  ${ALLOWED_ORIGINS:-https://chatcorp.buildtovalue.cloud}
      JWT_SECRET:       ${JWT_SECRET}
      UPLOAD_DIR:       /uploads
      RUST_LOG:         ${RUST_LOG:-info}
      API_KEY_HMAC_SECRET: ${API_KEY_HMAC_SECRET}
      QDRANT_URL:       http://qdrant:6333
      QDRANT_API_KEY:   ${QDRANT_API_KEY}
    volumes:
      - document_uploads:/uploads
    networks: [btv-net]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    networks: [btv-net]
    depends_on:
      - api

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "7777:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks: [btv-net]
    depends_on:
      - frontend
      - api
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
