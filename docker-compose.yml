# BTV Chat Corp — Docker Compose
networks:
  btv-prod-net:
    # Rede gerenciada pelo proprio compose — `docker compose up` cria automaticamente.
    # (Para anexar a uma rede externa de ops, sobrescreva em docker-compose.prod.yml.)
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  document_uploads:
  embedding_cache:
  redis_data:

services:

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-btv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-btvchat}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [btv-prod-net]

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-btv}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cache distribuido: rate limiting, refresh tokens/sessoes e pub/sub do WebSocket.
  # Permite rodar a API stateless (`docker compose up --scale api=N`).
  redis:
    image: redis:7-alpine
    restart: always
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?defina REDIS_PASSWORD no .env}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks: [btv-prod-net]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.0
    restart: always
    environment:
      # Exige a API key em toda chamada (antes o Qdrant aceitava sem autenticacao).
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?defina QDRANT_API_KEY no .env}
    volumes:
      - qdrant_data:/qdrant/storage
    networks: [btv-prod-net]


  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL:     postgresql://${POSTGRES_USER:-btv}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-btvchat}
      OLLAMA_URL: "${OLLAMA_URL:?defina OLLAMA_URL no .env (ex.: http://host.docker.internal:11434 ou a URL do seu Ollama na VPS)}"
      OLLAMA_MODEL:     ${OLLAMA_MODEL:-llama3.2:3b}
      EMBEDDING_URL: http://embedding:8001
      RERANKER_URL:  http://reranker:8003
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      OLLAMA_AUTH_USER: ${OLLAMA_AUTH_USER:-}
      OLLAMA_AUTH_PASS: ${OLLAMA_AUTH_PASS:-}
      ALLOWED_ORIGINS:  ${ALLOWED_ORIGINS:-http://localhost:4200}
      JWT_SECRET:       ${JWT_SECRET}
      UPLOAD_DIR:       /uploads
      RUST_LOG:         ${RUST_LOG:-info}
      API_KEY_HMAC_SECRET: ${API_KEY_HMAC_SECRET}
      QDRANT_URL:       http://qdrant:6333
      QDRANT_API_KEY:   ${QDRANT_API_KEY}
      # Redis para rate limiting distribuido / sessoes (API stateless).
      REDIS_URL:        redis://:${REDIS_PASSWORD}@redis:6379
      # SMTP (dev: mailpit captura tudo; prod: defina SMTP_* reais no .env).
      SMTP_HOST:        ${SMTP_HOST:-mailpit}
      SMTP_PORT:        ${SMTP_PORT:-1025}
      SMTP_USER:        ${SMTP_USER:-}
      SMTP_PASSWORD:    ${SMTP_PASSWORD:-}
    volumes:
      - document_uploads:/uploads
    networks: [btv-prod-net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s

  embedding:
    build:
      context: ./backend/services/embedding
    restart: always
    environment:
      INTERNAL_SERVICE_TOKEN:    ${INTERNAL_SERVICE_TOKEN}
      EMBEDDING_MODEL_REVISION:  ${EMBEDDING_MODEL_REVISION}
      EMBEDDING_MODEL:           ${EMBEDDING_MODEL:-nomic-ai/nomic-embed-text-v2-moe}
      EMBED_BATCH_SIZE:          ${EMBED_BATCH_SIZE:-32}
      EMBED_MAX_LENGTH:          ${EMBED_MAX_LENGTH:-512}
    volumes:
      - embedding_cache:/root/.cache/huggingface
    networks: [btv-prod-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

  # Reranker (CrossEncoder ms-marco) — 2o estagio de qualidade do RAG.
  # Ja existia como servico mas nunca entrava no compose; agora a API o consome
  # via RERANKER_URL. Imagem python:slim (sem curl) → healthcheck via urllib.
  reranker:
    build:
      context: ./backend/services/reranker
    restart: always
    environment:
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    networks: [btv-prod-net]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8003/health').status==200 else 1)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  document-processor:
    build:
      context: ./backend
      dockerfile: crates/document-processor/Dockerfile
    restart: always
    environment:
      DATABASE_URL:     postgresql://${POSTGRES_USER:-btv}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-btvchat}
      QDRANT_URL:       http://qdrant:6333
      QDRANT_API_KEY:   ${QDRANT_API_KEY}
      EMBEDDING_URL:    http://embedding:8001
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      STORAGE_PATH:     /uploads
      POLL_INTERVAL_SECS: ${WORKER_POLL_INTERVAL_SECS:-5}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      MAX_RETRIES:      ${WORKER_MAX_RETRIES:-3}
      RUST_LOG:         ${RUST_LOG:-info}
    volumes:
      - document_uploads:/uploads
    networks: [btv-prod-net]
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      embedding:
        condition: service_healthy

  # Captura de e-mails em desenvolvimento (SMTP :1025 / UI web :8025).
  # Em producao, troque SMTP_* no .env para o servidor real.
  mailpit:
    image: axllent/mailpit:v1.20
    restart: always
    networks: [btv-prod-net]

  # Pool de conexoes Postgres — hook de escala (opt-in via `--profile scale`).
  # Quando ativo, aponte DATABASE_URL para pgbouncer:6432 (pool transaction).
  pgbouncer:
    image: edoburu/pgbouncer:v1.23.1-p2
    profiles: [scale]
    restart: always
    environment:
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB:-btvchat}
      DB_USER: ${POSTGRES_USER:-btv}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 25
      AUTH_TYPE: scram-sha-256
    networks: [btv-prod-net]
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    networks: [btv-prod-net]
    depends_on:
      - api

  nginx:
    image: nginx:1.25-alpine
    container_name: btvchatcorp_nginx_1
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks: [btv-prod-net]
    depends_on:
      - frontend
      - api
    # nginx:alpine nao tem curl — usa o wget do busybox.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
