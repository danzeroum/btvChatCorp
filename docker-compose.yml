# BTV Chat Corp — Docker Compose
# Uso:
#   docker compose --profile core up         # servicos essenciais
#   docker compose --profile full up         # todos os servicos (requer GPU)
#   docker compose --profile gpu up          # vllm + training (GPU obrigatorio)

networks:
  btv-net:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  document_uploads:

services:

  # ---- Infraestrutura ----

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    profiles: [core, full, gpu]
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-btv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-btvchat}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [btv-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-btv}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    profiles: [core, full, gpu]
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks: [btv-net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.13.0
    restart: always
    profiles: [core, full, gpu]
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    volumes:
      - qdrant_data:/qdrant/storage
    networks: [btv-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---- Backend Core ----

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    profiles: [core, full, gpu]
    environment:
      DATABASE_URL:    postgresql://${POSTGRES_USER:-btv}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-btvchat}
      REDIS_URL:       redis://:${REDIS_PASSWORD}@redis:6379
      QDRANT_URL:      http://qdrant:6333
      QDRANT_API_KEY:  ${QDRANT_API_KEY}
      EMBEDDING_URL:   http://embedding:8001
      OLLAMA_URL:      ${OLLAMA_HOST:-http://ollama:11434}
      OLLAMA_MODEL:    ${OLLAMA_MODEL:-llama3:8b}
      OLLAMA_AUTH_USER: ${OLLAMA_AUTH_USER:-}
      OLLAMA_AUTH_PASS: ${OLLAMA_AUTH_PASS:-}
      JWT_SECRET:      ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:4200,https://app.btvc.com}
      UPLOAD_DIR:      /uploads
      RUST_LOG:        ${RUST_LOG:-info}
    volumes:
      - document_uploads:/uploads
    networks: [btv-net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---- BTV Gateway (API publica OpenAI-compatible) ----

  btv-gateway:
    build:
      context: ./backend
      dockerfile: crates/api-public/Dockerfile
    restart: always
    profiles: [core, full, gpu]
    environment:
      DATABASE_URL:          postgresql://${POSTGRES_USER:-btv}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-btvchat}
      INTERNAL_API_URL:      http://api:3000
      GATEWAY_BIND_ADDR:     0.0.0.0:4000
      GATEWAY_RATE_LIMIT_RPM: ${GATEWAY_RATE_LIMIT_RPM:-60}
      RUST_LOG:              ${RUST_LOG:-info}
    networks: [btv-net]
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ---- Embedding Service ----

  embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    restart: always
    profiles: [core, full, gpu]
    command: --model-id nomic-ai/nomic-embed-text-v1.5 --port 8001
    networks: [btv-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ---- Frontend ----

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    profiles: [core, full, gpu]
    networks: [btv-net]
    depends_on:
      api:
        condition: service_healthy

  # ---- Nginx (reverse proxy + TLS) ----

  nginx:
    image: nginx:1.25-alpine
    restart: always
    profiles: [core, full, gpu]
    ports:
      - "80:80"
      - "443:443"
      - "4000:4000"
    volumes:
      - ./nginx/nginx-wildcard.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/letsencrypt:ro
    networks: [btv-net]
    depends_on:
      frontend:
        condition: service_started
      api:
        condition: service_healthy
      btv-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---- LLM Inference (requer GPU) ----

  vllm:
    image: vllm/vllm-openai:latest
    restart: on-failure
    profiles: [gpu, full]
    command:
      - --model
      - meta-llama/Meta-Llama-3-8B-Instruct
      - --port
      - "8000"
      - --gpu-memory-utilization
      - "0.85"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks: [btv-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 180s

  # ---- Training Service (requer GPU) ----

  training:
    build:
      context: ./backend/training
      dockerfile: Dockerfile.training
    restart: on-failure
    profiles: [gpu, full]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-btv}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-btvchat}
      VLLM_URL:     http://vllm:8000
      QDRANT_URL:   http://qdrant:6333
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks: [btv-net]
    depends_on:
      postgres:
        condition: service_healthy
      vllm:
        condition: service_healthy
