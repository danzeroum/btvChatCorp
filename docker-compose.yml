# BTV Chat Corp — Docker Compose
networks:
  btv-prod-net:
    external: true
    name: ops_btv-prod-net

volumes:
  postgres_data:
  qdrant_data:
  document_uploads:
  embedding_cache:

services:

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-btv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-btvchat}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [btv-prod-net]

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-btv}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.0
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage
    networks: [btv-prod-net]


  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL:     postgresql://${POSTGRES_USER:-btv}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-btvchat}
      OLLAMA_URL: http://172.24.0.1:11434
      OLLAMA_MODEL:     ${OLLAMA_MODEL:-llama3.2:3b}
      EMBEDDING_URL: http://embedding:8001
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      OLLAMA_AUTH_USER: ${OLLAMA_AUTH_USER}
      OLLAMA_AUTH_PASS: ${OLLAMA_AUTH_PASS}
      ALLOWED_ORIGINS:  ${ALLOWED_ORIGINS:-https://chatcorp.buildtovalue.cloud}
      JWT_SECRET:       ${JWT_SECRET}
      UPLOAD_DIR:       /uploads
      RUST_LOG:         ${RUST_LOG:-info}
      API_KEY_HMAC_SECRET: ${API_KEY_HMAC_SECRET}
      QDRANT_URL:       http://qdrant:6333
      QDRANT_API_KEY:   ${QDRANT_API_KEY}
    volumes:
      - document_uploads:/uploads
    networks: [btv-prod-net]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s

  embedding:
    build:
      context: ./backend/services/embedding
    restart: always
    environment:
      INTERNAL_SERVICE_TOKEN:    ${INTERNAL_SERVICE_TOKEN}
      EMBEDDING_MODEL_REVISION:  ${EMBEDDING_MODEL_REVISION}
      EMBEDDING_MODEL:           ${EMBEDDING_MODEL:-nomic-ai/nomic-embed-text-v2-moe}
      EMBED_BATCH_SIZE:          ${EMBED_BATCH_SIZE:-32}
      EMBED_MAX_LENGTH:          ${EMBED_MAX_LENGTH:-512}
    volumes:
      - embedding_cache:/root/.cache/huggingface
    networks: [btv-prod-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

  document-processor:
    build:
      context: ./backend
      dockerfile: crates/document-processor/Dockerfile
    restart: always
    environment:
      DATABASE_URL:     postgresql://${POSTGRES_USER:-btv}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-btvchat}
      QDRANT_URL:       http://qdrant:6333
      QDRANT_API_KEY:   ${QDRANT_API_KEY}
      EMBEDDING_URL:    http://embedding:8001
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      STORAGE_PATH:     /uploads
      POLL_INTERVAL_SECS: ${WORKER_POLL_INTERVAL_SECS:-5}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      MAX_RETRIES:      ${WORKER_MAX_RETRIES:-3}
      RUST_LOG:         ${RUST_LOG:-info}
    volumes:
      - document_uploads:/uploads
    networks: [btv-prod-net]
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      embedding:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    networks: [btv-prod-net]
    depends_on:
      - api

  nginx:
    image: nginx:1.25-alpine
    container_name: btvchatcorp_nginx_1
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro    
    networks: [btv-prod-net]
    depends_on:
      - frontend
      - api
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
