# ============================================================
# BTV Chat Corp — Docker Compose para DESENVOLVIMENTO
# Usa Ollama externo (VPS) como LLM — sem vLLM local, sem GPU
#
# Uso:
#   ./scripts/gen-env.sh            # gera .env + cert self-signed
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# ============================================================

services:

  # Desativa o embedding GPU — usa CPU em dev
  embedding:
    deploy:
      resources: {}   # remove reserva de GPU

  # API aponta para Ollama externo (VPS). Auth e opcional — muitos Ollama nao exigem.
  api:
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_AUTH_USER: ${OLLAMA_AUTH_USER:-}
      OLLAMA_AUTH_PASS: ${OLLAMA_AUTH_PASS:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      VLLM_URL: ""   # nao usado em modo ollama
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  # Document processor tambem usa embedding CPU
  document-processor:
    environment:
      EMBEDDING_URL: http://embedding:8001
