# Docker Compose para o stack RAG completo
# Uso: docker compose -f backend/docker-compose.rag.yml --env-file .env up

services:

  # --------------------------------------------------------------------------
  # Qdrant — banco vetorial
  # --------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.13.0
    container_name: btv_qdrant
    # Sem mapeamento de porta externa — acessível apenas via rede interna btv-net
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?Erro: QDRANT_API_KEY obrigatorio}
    restart: unless-stopped
    networks:
      - btv-net
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "api-key: ${QDRANT_API_KEY}", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Serviço de Embedding — Nomic Embed V2 (Python/FastAPI)
  # --------------------------------------------------------------------------
  embedding:
    build:
      context: ./services/embedding
      dockerfile: Dockerfile
    container_name: btv_embedding
    # Sem mapeamento de porta externa — acessível apenas via rede interna btv-net
    environment:
      EMBEDDING_MODEL: nomic-ai/nomic-embed-text-v2-moe
      EMBED_BATCH_SIZE: "32"
      EMBED_MAX_LENGTH: "512"
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      EMBEDDING_MODEL_REVISION: "1066b6599d099fbb93dfcb64f9c37a7c9e503e85"
      PORT: "8001"
    volumes:
      - embedding_cache:/root/.cache/huggingface
    restart: unless-stopped
    networks:
      - btv-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # --------------------------------------------------------------------------
  # RAG Worker — Rust (document-processor)
  # --------------------------------------------------------------------------
  rag-worker:
    build:
      context: ..           # raiz do monorepo
      dockerfile: backend/crates/document-processor/Dockerfile
    container_name: btv_rag_worker
    environment:
      DATABASE_URL: ${DATABASE_URL}
      QDRANT_URL: http://qdrant:6333
      EMBEDDING_URL: http://embedding:8001
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      STORAGE_PATH: /data/uploads
      POLL_INTERVAL_SECS: "10"
      WORKER_CONCURRENCY: "4"
      MAX_RETRIES: "3"
      RUST_LOG: info
    volumes:
      - uploads:/data/uploads
    depends_on:
      qdrant:
        condition: service_healthy
      embedding:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - btv-net

networks:
  btv-net:
    external: true
    name: btvchatcorp_btv-net

volumes:
  qdrant_data:
  embedding_cache:
  uploads:
