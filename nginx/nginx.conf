worker_processes auto;
events { worker_connections 4096; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain application/json application/javascript text/css;

    # Rate limiting global
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    upstream api_backend {
        server api:8080;
        keepalive 64;
    }

    upstream frontend_backend {
        server frontend:80;
        keepalive 32;
    }

    # ──────────────────────────────────────────────
    # HTTP (dev local / sem SSL)
    # ──────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy strict-origin-when-cross-origin;

        # Auth endpoints
        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # API REST
        location /api/ {
            limit_req zone=api burst=100 nodelay;
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
            client_max_body_size 50M;
        }

        # WebSocket (chat streaming)
        location /api/ws {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Swagger UI
        location = /api-docs {
            proxy_pass http://api_backend/docs;
        }

        # Health check público
        location = /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # Frontend Angular (SPA) — fallback para index.html
        location / {
            proxy_pass         http://frontend_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }
    }

    # ──────────────────────────────────────────────
    # HTTPS (produção — descomente quando tiver SSL)
    # ──────────────────────────────────────────────
    # server {
    #     listen 443 ssl;
    #     http2 on;
    #     server_name chat.seudominio.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    #     ssl_prefer_server_ciphers off;
    #
    #     add_header Strict-Transport-Security "max-age=63072000" always;
    #
    #     # (mesmos location blocks do bloco HTTP acima)
    # }
}
