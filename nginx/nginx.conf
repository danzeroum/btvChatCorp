worker_processes auto;
events { worker_connections 4096; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain application/json application/javascript text/css application/wasm;

    # Rate limiting global (por IP, na borda). O rate-limit por API key fica na app (Redis).
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_status 429;

    # Resolver Docker interno
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Blocos reutilizaveis -------------------------------------------------
    map $http_x_forwarded_proto $fwd_proto { default $scheme; "~." $http_x_forwarded_proto; }

    # ---- HTTP :80 — healthcheck local + redirect para HTTPS ----
    server {
        listen 80;
        server_name _;

        # Mantem o /health em :80 para o healthcheck do container (sem redirect).
        location = /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # Todo o resto vai para HTTPS.
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---- HTTPS :443 — app ----
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss: https:;" always;

        set $api_upstream      http://api:3000;
        set $frontend_upstream http://frontend:80;

        # JSON error pages for /api/ routes (upstream down or rate-limited)
        error_page 429 @json_429;
        error_page 502 503 504 @json_5xx;

        location @json_429 {
            default_type application/json;
            return 429 '{"error":{"code":"RATE_LIMIT","message":"Muitas tentativas. Aguarde 1 minuto antes de tentar novamente."}}';
        }

        location @json_5xx {
            default_type application/json;
            return 503 '{"error":{"code":"SERVICE_UNAVAILABLE","message":"Serviço temporariamente indisponível. Tente novamente em instantes."}}';
        }

        # Auth endpoints
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass         $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_intercept_errors on;
        }

        # SSE — streaming de chat. Buffering OFF para os tokens chegarem em tempo real.
        location /api/v1/chat/stream {
            proxy_pass         $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   Connection "";
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;
            chunked_transfer_encoding on;
        }

        # API REST
        location /api/ {
            limit_req zone=api burst=100 nodelay;
            proxy_pass         $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
            client_max_body_size 50M;
            proxy_intercept_errors on;
        }

        # WebSocket (chat bidirecional — Sprint 5)
        location /api/ws {
            proxy_pass         $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Swagger UI
        location = /api-docs {
            proxy_pass $api_upstream/docs;
        }

        # Health check público
        location = /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # Frontend Angular (SPA)
        location / {
            proxy_pass         $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Forwarded-Proto https;
        }
    }
}
