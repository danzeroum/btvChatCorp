worker_processes auto;
events { worker_connections 4096; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain application/json application/javascript text/css application/wasm;

    # Rate limiting global
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # Rate-limit violations → 429, not 503
    limit_req_status 429;

    # Resolver Docker interno
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss: https:;" always;

        set $api_upstream      http://api:3000;
        set $frontend_upstream http://frontend:80;

        # JSON error pages for /api/ routes (upstream down or rate-limited)
        error_page 429 @json_429;
        error_page 502 503 504 @json_5xx;

        location @json_429 {
            default_type application/json;
            return 429 '{"error":{"code":"RATE_LIMIT","message":"Muitas tentativas. Aguarde 1 minuto antes de tentar novamente."}}';
        }

        location @json_5xx {
            default_type application/json;
            return 503 '{"error":{"code":"SERVICE_UNAVAILABLE","message":"Serviço temporariamente indisponível. Tente novamente em instantes."}}';
        }

        # Auth endpoints
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass         $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_intercept_errors on;
        }

        # API REST
        location /api/ {
            limit_req zone=api burst=100 nodelay;
            proxy_pass         $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
            client_max_body_size 50M;
            proxy_intercept_errors on;
        }

        # WebSocket (chat streaming)
        location /api/ws {
            proxy_pass         $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Swagger UI
        location = /api-docs {
            proxy_pass $api_upstream/docs;
        }

        # Health check público
        location = /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # Frontend Angular (SPA) — try_files garante MIME correto para assets
        location / {
            proxy_pass         $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        }
    }
}
