# nginx.conf para wildcards de subdominio dos parceiros BTV
# Requer certificado wildcard: *.btvc.com (Let's Encrypt via DNS-01)
#
# Instrucoes para gerar certificado wildcard:
#   certbot certonly \
#     --dns-cloudflare \
#     --dns-cloudflare-credentials /etc/letsencrypt/cloudflare.ini \
#     -d 'btvc.com' \
#     -d '*.btvc.com'

server {
    listen 80;
    server_name btvc.com *.btvc.com;
    return 301 https://$host$request_uri;
}

# API publica (BTV Gateway) em subdominio dedicado
server {
    listen 443 ssl http2;
    server_name api.btvc.com;

    ssl_certificate     /etc/letsencrypt/live/btvc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/btvc.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://btv-gateway:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# App principal em app.btvc.com
server {
    listen 443 ssl http2;
    server_name app.btvc.com;

    ssl_certificate     /etc/letsencrypt/live/btvc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/btvc.com/privkey.pem;

    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }
}

# Workspaces white-label de parceiros: *.btvc.com
# Cada subdominio e roteado para o mesmo frontend, que identifica
# o workspace pelo header Host e busca o branding correspondente.
server {
    listen 443 ssl http2;
    server_name ~^(?<subdomain>[a-z0-9-]+)\.btvc\.com$;

    ssl_certificate     /etc/letsencrypt/live/btvc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/btvc.com/privkey.pem;

    # Envia o subdominio ao backend para resolver o workspace_id
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Workspace-Subdomain $subdomain;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Workspace-Subdomain $subdomain;
    }
}
