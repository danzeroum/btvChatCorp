name: E2E Tests (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      # Stack mínima para E2E
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER:     btv
          POSTGRES_PASSWORD: e2e_test_pass
          POSTGRES_DB:       btvchat_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL:   postgresql://btv:e2e_test_pass@localhost:5432/btvchat_test
      JWT_SECRET:     e2e_jwt_secret_test_only_32chars_here
      QDRANT_API_KEY: e2e_test_key
      REDIS_PASSWORD: e2e_redis_pass
      RUST_LOG:       warn
      BASE_URL:       http://localhost:7777
      E2E_USER_EMAIL:    admin@btvc.com
      E2E_USER_PASSWORD: BTV_E2E_Test!

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package.json

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Build e start stack (core profile)
        run: |
          cp .env.example .env
          sed -i 's/POSTGRES_PASSWORD=TROQUE_AQUI/POSTGRES_PASSWORD=e2e_test_pass/' .env
          sed -i 's/JWT_SECRET=TROQUE_AQUI/JWT_SECRET=e2e_jwt_secret_test_only_32chars_here/' .env
          sed -i 's/QDRANT_API_KEY=TROQUE_AQUI/QDRANT_API_KEY=e2e_test_key/' .env
          sed -i 's/REDIS_PASSWORD=TROQUE_AQUI/REDIS_PASSWORD=e2e_redis_pass/' .env
          docker compose --profile core up -d --build
          # Aguarda api saudável (max 3min)
          for i in $(seq 1 36); do
            curl -sf http://localhost:7777/health && break
            echo "Aguardando stack... ($i/36)"
            sleep 5
          done

      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test --reporter=list,html

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Tear down stack
        if: always()
        run: docker compose --profile core down -v
