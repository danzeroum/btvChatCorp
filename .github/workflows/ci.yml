name: CI – Fase 4

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1 – Frontend Angular
  # ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Angular 17)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-modules-${{ hashFiles('frontend/package.json') }}
          restore-keys: node-modules-

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build (production)
        run: npm run build -- --configuration production

      - name: Unit tests (headless) + coverage
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: "[Fase 4] adminGuard nas rotas de training"
        run: |
          grep -q 'adminGuard' src/app/features/training-dashboard/training-dashboard.routes.ts \
            && echo "✅ adminGuard presente" \
            || (echo "❌ adminGuard ausente" && exit 1)

      - name: "[Fase 4] interceptor trata 401/403"
        run: |
          grep -q '401' src/app/features/auth/auth.interceptor.ts \
            && grep -q '403' src/app/features/auth/auth.interceptor.ts \
            && echo "✅ auth.interceptor OK" \
            || (echo "❌ Tratamento 401/403 ausente" && exit 1)

      - name: "[Fase 4] componentes UX polish existem"
        run: |
          for f in \
            src/app/core/components/loading-skeleton.component.ts \
            src/app/core/components/empty-state.component.ts \
            src/app/core/components/error-banner.component.ts \
            src/app/core/handlers/global-error-handler.ts; do
            [ -f "$f" ] || (echo "❌ Ausente: $f" && exit 1)
          done
          echo "✅ Componentes UX polish OK"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/

  # ──────────────────────────────────────────────────────────
  # JOB 2 – Backend Rust
  # ──────────────────────────────────────────────────────────
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: btv
          POSTGRES_PASSWORD: btv
          POSTGRES_DB: btvtest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgres://btv:btv@localhost:5432/btvtest
      JWT_SECRET: test_secret_for_ci_only
      UPLOAD_DIR: /tmp/btv-uploads
      OLLAMA_URL: http://localhost:11434
      OLLAMA_MODEL: llama3.1:8b
      OLLAMA_MOCK: "true"
      TRAINING_MOCK: "true"
      TRAINING_URL: https://api.buildtovalue.cloud

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.toml', 'backend/crates/api/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt
        run: cargo fmt --all

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Criar diretorio de uploads
        run: mkdir -p $UPLOAD_DIR

      - name: Run migrations
        run: |
          cargo install sqlx-cli --no-default-features --features postgres 2>/dev/null || true
          sqlx migrate run --database-url "$DATABASE_URL" --source crates/api/migrations

      - name: cargo test
        run: cargo test --all -- --test-threads=1

      - name: "[Fase 4] Middleware JWT presente"
        run: |
          grep -rq 'jwt' crates/api/src/middleware/ \
            && echo "✅ Middleware JWT OK" \
            || (echo "❌ Middleware JWT ausente" && exit 1)

  # ──────────────────────────────────────────────────────────
  # JOB 3 – Smoke test
  # DB proprio (btvsmoke) — completamente virgem, sem conflito
  # de migrations com o job backend
  # ──────────────────────────────────────────────────────────
  integration-smoke:
    name: Integration smoke test
    runs-on: ubuntu-latest
    needs: [backend]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: btv
          POSTGRES_PASSWORD: btv
          # banco proprio: btvsmoke — nunca tocado pelo job backend
          POSTGRES_DB: btvsmoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgres://btv:btv@localhost:5432/btvsmoke
      JWT_SECRET: test_secret_for_ci_only
      UPLOAD_DIR: /tmp/btv-uploads
      OLLAMA_URL: http://localhost:11434
      OLLAMA_MODEL: llama3.1:8b
      OLLAMA_MOCK: "true"
      TRAINING_MOCK: "true"
      TRAINING_URL: https://api.buildtovalue.cloud
      LISTEN_ADDR: "0.0.0.0:8080"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.toml', 'backend/crates/api/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres 2>/dev/null || true

      - name: Run migrations (banco btvsmoke virgem)
        working-directory: backend
        run: |
          sqlx migrate run --database-url "$DATABASE_URL" --source crates/api/migrations

      - name: Build backend (debug)
        working-directory: backend
        run: cargo build -p api

      - name: Start backend
        working-directory: backend
        run: |
          mkdir -p $UPLOAD_DIR
          ./target/debug/api &
          echo $! > /tmp/api.pid
          echo "PID: $(cat /tmp/api.pid)"
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "✅ Backend respondeu na tentativa $i"
              break
            fi
            if [ "$i" -eq 40 ]; then
              echo "❌ Backend nao respondeu em 40 tentativas"
              exit 1
            fi
            echo "Aguardando... ($i/40)"
            sleep 3
          done

      - name: "[Smoke] GET /health"
        run: |
          R=$(curl -sf http://localhost:8080/health)
          echo "$R"
          echo "$R" | grep -q '"status"' || (echo "❌ /health sem status" && exit 1)
          echo "✅ /health OK"

      - name: "[Smoke] POST /auth/register"
        run: |
          CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST http://localhost:8080/api/v1/auth/register \
            -H 'Content-Type: application/json' \
            -d '{"workspace_name":"Smoke Workspace","name":"Smoke Test","email":"smoke@test.com","password":"Smoke@1234"}')
          echo "Status: $CODE"
          [ "$CODE" = "201" ] || [ "$CODE" = "200" ] || [ "$CODE" = "409" ] \
            || (echo "❌ /auth/register retornou $CODE" && exit 1)
          echo "✅ /auth/register OK ($CODE)"

      - name: "[Smoke] POST /auth/login retorna token"
        run: |
          curl -s -X POST http://localhost:8080/api/v1/auth/register \
            -H 'Content-Type: application/json' \
            -d '{"workspace_name":"Smoke WS2","name":"Smoke Login","email":"smoke2@test.com","password":"Smoke@1234"}' > /dev/null || true
          R=$(curl -sf -X POST http://localhost:8080/api/v1/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"smoke2@test.com","password":"Smoke@1234"}')
          echo "$R"
          echo "$R" | grep -q '"token"' || (echo "❌ /auth/login sem token" && exit 1)
          echo "✅ /auth/login OK"

      - name: "[Smoke] /training sem token retorna 401/403"
        run: |
          CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            http://localhost:8080/api/v1/training/feedback)
          echo "Status sem token: $CODE"
          [ "$CODE" = "401" ] || [ "$CODE" = "403" ] \
            || (echo "❌ Rota protegida retornou $CODE" && exit 1)
          echo "✅ /training protegida OK ($CODE)"

      - name: Stop backend
        if: always()
        run: kill $(cat /tmp/api.pid) 2>/dev/null || true

  # ──────────────────────────────────────────────────────────
  # JOB 4 – Gate final
  # ──────────────────────────────────────────────────────────
  all-green:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [frontend, backend, integration-smoke]
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [ "${{ needs.frontend.result }}"          != "success" ] || \
             [ "${{ needs.backend.result }}"           != "success" ] || \
             [ "${{ needs.integration-smoke.result }}" != "success" ]; then
            echo "❌ One or more jobs failed."
            echo "  Frontend:          ${{ needs.frontend.result }}"
            echo "  Backend:           ${{ needs.backend.result }}"
            echo "  Integration smoke: ${{ needs.integration-smoke.result }}"
            exit 1
          fi
          echo "✅ All checks passed — Fase 4.1 OK!"
